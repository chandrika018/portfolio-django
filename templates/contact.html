{% extends "base.html" %}
{% block body %}
<div class="bg-[#0b1220] text-white px-6 py-16">

  <h1 class="text-4xl font-bold text-center mb-12">📬 Contact Me</h1>

  <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-10">

    <!-- Contact Info -->
    <div class="bg-[#121a2f] p-8 rounded-2xl shadow-lg border border-blue-500/20">
      <h2 class="text-2xl font-semibold mb-6 text-blue-400">Get in Touch</h2>

      <div class="space-y-4 text-gray-300">
        <p class="flex items-center gap-3">
          <i class="fas fa-envelope text-pink-400"></i>
          chandrikanandesariya018@gmail.com
        </p>

        <p class="flex items-center gap-3">
          <i class="fas fa-phone text-green-400"></i>
          +91 9106950665
        </p>

        <p class="flex items-center gap-3">
          <i class="fas fa-map-marker-alt text-red-400"></i>
          Bhavnagar,Gujarat, India
        </p>
      </div>

      <div class="flex gap-4 mt-6 text-xl">
        <i class="fab fa-linkedin text-blue-400 hover:scale-125 transition"></i>
        <i class="fab fa-github text-white hover:scale-125 transition"></i>
        <i class="fab fa-instagram text-pink-400 hover:scale-125 transition"></i>
      </div>
    </div>

    <!-- Contact Form -->
    <div class="bg-[#121a2f] p-8 rounded-2xl shadow-lg border border-green-500/20">
      <h2 class="text-2xl font-semibold mb-6 text-green-400">Send Message</h2>

      <form class="space-y-4">
        <input type="text" placeholder="Your Name"
          class="w-full p-3 rounded bg-[#0b1220] border border-gray-600 focus:outline-none focus:border-green-400">

        <input type="email" placeholder="Your Email"
          class="w-full p-3 rounded bg-[#0b1220] border border-gray-600 focus:outline-none focus:border-green-400">

        <textarea placeholder="Your Message" rows="4"
          class="w-full p-3 rounded bg-[#0b1220] border border-gray-600 focus:outline-none focus:border-green-400"></textarea>

        <button class="w-full bg-green-500 py-3 rounded hover:bg-green-600 transition">
          Send Message
        </button>
      </form>
    </div>

  </div>
{% endblock body %}
